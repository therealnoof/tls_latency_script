worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $status "$request" $body_bytes_sent';
    access_log /var/log/nginx/access.log main;

    # --- HTTP (for F5 pool health checks / HTTP backends) ---
    server {
        listen 80 default_server;
        server_name _;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 200 '{"service":"tls-latency-backend","proto":"http"}';
            add_header Content-Type application/json;
        }
    }

    # --- HTTPS (for SSL bridging / direct TLS testing) ---
    server {
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        # TLS 1.2 ciphers
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

        # TLS 1.3 ECDH + PQC groups (nginx/OpenSSL will ignore unsupported ones)
        ssl_ecdh_curve X25519:P-256:P-384;

        location /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location / {
            return 200 '{"service":"tls-latency-backend","proto":"https"}';
            add_header Content-Type application/json;
        }
    }
}
